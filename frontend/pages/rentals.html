<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Rental Management — Movie Rental Platform</title><link rel="stylesheet" href="../css/style.css" /></head>
<body>
  <aside class="sidebar"><div class="sidebar-logo"><div class="logo-icon">🎬</div><div class="logo-text">Movie <span>Rental</span><br>& Review Platform</div></div><nav class="sidebar-nav"><div class="nav-section-label">Main</div><a href="../index.html" class="nav-item"><span class="nav-icon">🏠</span> Dashboard</a><div class="nav-section-label">Management</div><a href="users.html" class="nav-item"><span class="nav-icon">👥</span> Users</a><a href="movies.html" class="nav-item"><span class="nav-icon">🎥</span> Movies</a><a href="rentals.html" class="nav-item active"><span class="nav-icon">📋</span> Rentals</a><a href="reviews.html" class="nav-item"><span class="nav-icon">⭐</span> Reviews</a><a href="payments.html" class="nav-item"><span class="nav-icon">💳</span> Payments</a><a href="watchlist.html" class="nav-item"><span class="nav-icon">🔖</span> Watchlist</a></nav><div class="sidebar-footer">© 2024 Movie Rental Platform</div></aside>
  <div class="main-content">
    <header class="top-header"><div class="page-title-section"><h1>Rental Management</h1><p>Total: <strong id="rentalCount">—</strong> rentals</p></div><div class="header-actions"><div class="search-box"><span class="search-icon">🔍</span><input type="text" id="rentalSearch" placeholder="Search rentals…" /></div><button class="btn btn-primary" onclick="openAddRental()">➕ New Rental</button><div id="headerUser"></div></div></header>
    <div class="page-content"><div class="panel"><div class="panel-header"><div><div class="panel-title">All Rentals</div><div class="panel-subtitle">Track movie rentals by customer</div></div></div><div class="table-wrapper"><table><thead><tr><th>ID</th><th>Customer</th><th>Movie</th><th>Rental Date</th><th>Return Date</th><th>Status</th><th>Amount</th><th>Actions</th></tr></thead><tbody id="rentalsTableBody"><tr class="loading-row"><td colspan="8"><span class="spinner"></span></td></tr></tbody></table></div></div></div>
  </div>
  <div class="modal-overlay" id="rentalModal"><div class="modal"><div class="modal-header"><div class="modal-title" id="rentalModalTitle">New Rental</div><button class="modal-close" onclick="closeModal('rentalModal')">✕</button></div><div class="modal-body"><form id="rentalForm" onsubmit="event.preventDefault();saveRental();"><div class="form-group"><label class="form-label">Customer *</label><select id="rentalUserSelect" class="form-control"><option value="">Loading…</option></select></div><div class="form-group"><label class="form-label">Movie *</label><select id="rentalMovieSelect" class="form-control"><option value="">Loading…</option></select></div><div class="form-row"><div class="form-group"><label class="form-label">Rental Date *</label><input type="date" name="rentalDate" class="form-control" required /></div><div class="form-group"><label class="form-label">Return Date</label><input type="date" name="returnDate" class="form-control" /></div></div><div class="form-row"><div class="form-group"><label class="form-label">Status</label><select name="status" class="form-control"><option value="ACTIVE">ACTIVE</option><option value="RETURNED">RETURNED</option><option value="OVERDUE">OVERDUE</option></select></div><div class="form-group"><label class="form-label">Total Amount ($) *</label><input type="number" name="totalAmount" class="form-control" step="0.01" min="0" required /></div></div></form></div><div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal('rentalModal')">Cancel</button><button class="btn btn-primary" onclick="saveRental()">💾 Save</button></div></div></div>
  <script src="../js/auth.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/rentals.js"></script>
  <script>requireAuth('ADMIN'); renderUserInfo('headerUser');</script>
</body>
</html>
