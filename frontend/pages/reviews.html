<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Reviews — Movie Rental Platform</title><link rel="stylesheet" href="../css/style.css" /></head>
<body>
  <aside class="sidebar"><div class="sidebar-logo"><div class="logo-icon">🎬</div><div class="logo-text">Movie <span>Rental</span><br>& Review Platform</div></div><nav class="sidebar-nav"><div class="nav-section-label">Main</div><a href="../index.html" class="nav-item"><span class="nav-icon">🏠</span> Dashboard</a><div class="nav-section-label">Management</div><a href="users.html" class="nav-item"><span class="nav-icon">👥</span> Users</a><a href="movies.html" class="nav-item"><span class="nav-icon">🎥</span> Movies</a><a href="rentals.html" class="nav-item"><span class="nav-icon">📋</span> Rentals</a><a href="reviews.html" class="nav-item active"><span class="nav-icon">⭐</span> Reviews</a><a href="payments.html" class="nav-item"><span class="nav-icon">💳</span> Payments</a><a href="watchlist.html" class="nav-item"><span class="nav-icon">🔖</span> Watchlist</a></nav><div class="sidebar-footer">© 2024 Movie Rental Platform</div></aside>
  <div class="main-content">
    <header class="top-header"><div class="page-title-section"><h1>Review Management</h1><p>Total: <strong id="reviewCount">—</strong> reviews</p></div><div class="header-actions"><div class="search-box"><span class="search-icon">🔍</span><input type="text" id="reviewSearch" placeholder="Search…" /></div><button class="btn btn-primary" onclick="openAddReview()">➕ Add Review</button><div id="headerUser"></div></div></header>
    <div class="page-content"><div class="panel"><div class="panel-header"><div><div class="panel-title">All Reviews</div></div></div><div class="table-wrapper"><table><thead><tr><th>ID</th><th>Customer</th><th>Movie</th><th>Rating</th><th>Comment</th><th>Date</th><th>Actions</th></tr></thead><tbody id="reviewsTableBody"><tr class="loading-row"><td colspan="7"><span class="spinner"></span></td></tr></tbody></table></div></div></div>
  </div>
  <div class="modal-overlay" id="reviewModal"><div class="modal"><div class="modal-header"><div class="modal-title" id="reviewModalTitle">Add Review</div><button class="modal-close" onclick="closeModal('reviewModal')">✕</button></div><div class="modal-body"><form id="reviewForm"><div class="form-row"><div class="form-group"><label class="form-label">Customer *</label><select id="reviewUserSelect" class="form-control"></select></div><div class="form-group"><label class="form-label">Movie *</label><select id="reviewMovieSelect" class="form-control"></select></div></div><div class="form-group"><label class="form-label">Rating *</label><select name="rating" class="form-control"><option value="5">⭐⭐⭐⭐⭐</option><option value="4">⭐⭐⭐⭐</option><option value="3">⭐⭐⭐</option><option value="2">⭐⭐</option><option value="1">⭐</option></select></div><div class="form-group"><label class="form-label">Comment</label><textarea name="comment" class="form-control" rows="3"></textarea></div></form></div><div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal('reviewModal')">Cancel</button><button class="btn btn-primary" onclick="saveReview()">💾 Save</button></div></div></div>
  <script src="../js/auth.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/reviews.js"></script>
  <script>requireAuth('ADMIN'); renderUserInfo('headerUser');</script>
</body>
</html>
