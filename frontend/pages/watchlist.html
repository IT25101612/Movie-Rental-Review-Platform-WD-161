<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Watchlist — Movie Rental Platform</title><link rel="stylesheet" href="../css/style.css" /></head>
<body>
  <aside class="sidebar"><div class="sidebar-logo"><div class="logo-icon">🎬</div><div class="logo-text">Movie <span>Rental</span><br>& Review Platform</div></div><nav class="sidebar-nav"><div class="nav-section-label">Main</div><a href="../index.html" class="nav-item"><span class="nav-icon">🏠</span> Dashboard</a><div class="nav-section-label">Management</div><a href="users.html" class="nav-item"><span class="nav-icon">👥</span> Users</a><a href="movies.html" class="nav-item"><span class="nav-icon">🎥</span> Movies</a><a href="rentals.html" class="nav-item"><span class="nav-icon">📋</span> Rentals</a><a href="reviews.html" class="nav-item"><span class="nav-icon">⭐</span> Reviews</a><a href="payments.html" class="nav-item"><span class="nav-icon">💳</span> Payments</a><a href="watchlist.html" class="nav-item active"><span class="nav-icon">🔖</span> Watchlist</a></nav><div class="sidebar-footer">© 2024 Movie Rental Platform</div></aside>
  <div class="main-content">
    <header class="top-header"><div class="page-title-section"><h1>Watchlist Management</h1><p>Total: <strong id="watchlistCount">—</strong> items</p></div><div class="header-actions"><div class="search-box"><span class="search-icon">🔍</span><input type="text" id="watchlistSearch" placeholder="Search…" /></div><button class="btn btn-primary" onclick="openAddWatchlist()">➕ Add to Watchlist</button><div id="headerUser"></div></div></header>
    <div class="page-content"><div class="panel"><div class="panel-header"><div><div class="panel-title">All Watchlist Items</div></div></div><div class="table-wrapper"><table><thead><tr><th>ID</th><th>Customer</th><th>Movie</th><th>Added Date</th><th>Status</th><th>Actions</th></tr></thead><tbody id="watchlistTableBody"><tr class="loading-row"><td colspan="6"><span class="spinner"></span></td></tr></tbody></table></div></div></div>
  </div>
  <div class="modal-overlay" id="watchlistModal"><div class="modal"><div class="modal-header"><div class="modal-title" id="watchlistModalTitle">Add to Watchlist</div><button class="modal-close" onclick="closeModal('watchlistModal')">✕</button></div><div class="modal-body"><form id="watchlistForm"><div class="form-group"><label class="form-label">Customer *</label><select id="watchlistUserSelect" class="form-control"></select></div><div class="form-group"><label class="form-label">Movie *</label><select id="watchlistMovieSelect" class="form-control"></select></div><div class="form-group"><label class="form-label">Status</label><select name="status" class="form-control"><option value="WANT_TO_WATCH">Want to Watch</option><option value="WATCHING">Watching</option><option value="WATCHED">Watched</option></select></div></form></div><div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal('watchlistModal')">Cancel</button><button class="btn btn-primary" onclick="saveWatchlist()">💾 Save</button></div></div></div>
  <script src="../js/auth.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/watchlist.js"></script>
  <script>requireAuth('ADMIN'); renderUserInfo('headerUser');</script>
</body>
</html>
