<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Movie Management — Movie Rental Platform</title><link rel="stylesheet" href="../css/style.css" /></head>
<body>
  <aside class="sidebar"><div class="sidebar-logo"><div class="logo-icon">🎬</div><div class="logo-text">Movie <span>Rental</span><br>& Review Platform</div></div><nav class="sidebar-nav"><div class="nav-section-label">Main</div><a href="../index.html" class="nav-item"><span class="nav-icon">🏠</span> Dashboard</a><div class="nav-section-label">Management</div><a href="users.html" class="nav-item"><span class="nav-icon">👥</span> Users</a><a href="movies.html" class="nav-item active"><span class="nav-icon">🎥</span> Movies</a><a href="rentals.html" class="nav-item"><span class="nav-icon">📋</span> Rentals</a><a href="reviews.html" class="nav-item"><span class="nav-icon">⭐</span> Reviews</a><a href="payments.html" class="nav-item"><span class="nav-icon">💳</span> Payments</a><a href="watchlist.html" class="nav-item"><span class="nav-icon">🔖</span> Watchlist</a></nav><div class="sidebar-footer">© 2024 Movie Rental Platform</div></aside>
  <div class="main-content">
    <header class="top-header"><div class="page-title-section"><h1>Movie Management</h1><p>Total: <strong id="movieCount">—</strong> movies</p></div><div class="header-actions"><div class="search-box"><span class="search-icon">🔍</span><input type="text" id="movieSearch" placeholder="Search movies…" /></div><button class="btn btn-primary" onclick="openAddMovie()">➕ Add Movie</button><div id="headerUser"></div></div></header>
    <div class="page-content"><div class="panel"><div class="panel-header"><div><div class="panel-title">Movie Catalog</div><div class="panel-subtitle">Browse and manage all movies</div></div></div><div class="table-wrapper"><table><thead><tr><th>ID</th><th>Title</th><th>Genre</th><th>Year</th><th>Price/Day</th><th>Status</th><th>Added</th><th>Actions</th></tr></thead><tbody id="moviesTableBody"><tr class="loading-row"><td colspan="8"><span class="spinner"></span></td></tr></tbody></table></div></div></div>
  </div>
  <div class="modal-overlay" id="movieModal"><div class="modal"><div class="modal-header"><div class="modal-title" id="movieModalTitle">Add Movie</div><button class="modal-close" onclick="closeModal('movieModal')">✕</button></div><div class="modal-body"><form id="movieForm" onsubmit="event.preventDefault();saveMovie();"><div class="form-group"><label class="form-label">Title *</label><input type="text" name="title" class="form-control" required /></div><div class="form-row"><div class="form-group"><label class="form-label">Genre</label><input type="text" name="genre" class="form-control" /></div><div class="form-group"><label class="form-label">Release Year</label><input type="number" name="releaseYear" class="form-control" min="1900" max="2030" /></div></div><div class="form-row"><div class="form-group"><label class="form-label">Rental Price ($/day) *</label><input type="number" name="rentalPrice" class="form-control" step="0.01" min="0.01" required /></div><div class="form-group"><label class="form-label">Availability</label><select name="available" class="form-control"><option value="true">Available</option><option value="false">Not Available</option></select></div></div><div class="form-group"><label class="form-label">Description</label><textarea name="description" class="form-control" rows="3"></textarea></div><div class="form-group"><label class="form-label">Poster URL</label><input type="url" name="posterUrl" class="form-control" /></div></form></div><div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal('movieModal')">Cancel</button><button class="btn btn-primary" onclick="saveMovie()">💾 Save</button></div></div></div>
  <script src="../js/auth.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/movies.js"></script>
  <script>requireAuth('ADMIN'); renderUserInfo('headerUser');</script>
</body>
</html>
